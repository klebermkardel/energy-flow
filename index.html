<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnergyFlow - Seu controle de produtividade</title>
    <link rel="stylesheet" href="./assets/CSS/styles.css">
</head>
<body>
    <div class="container">
        <h2>EnergyFlow - Seu controle de produtividade</h2>

        <div class="controls">
            <label>Tempo (ex: 1h30 ou 90): </label>
            <input type="text" id="input-time" placeholder="1h30min"    style="width: 100px;">
            <button onclick="startSystem()">Iniciar</button>
        </div>

        <div class="energy-wrapper">
            <div class="status-text">
                <span>Status da Célula</span>
                <span id="percent-text">100%</span>
            </div>
            <div class="progress-container">
                <div id="energy-bar"></div>
            </div>
        </div>

        <div id="timer-display">00:00</div>
    </div>

    <script src="./assets/js/script.js"></script>
</body>
</html>
